name: Test package
on: [push, pull_request]
run-name: >
  Testing Package From ${{ github.event_name == 'pull_request' &&
      format('🔀 PR #{0} [{1}] - {2}',
        github.event.pull_request.number,
        github.head_ref,
        github.event.pull_request.title
      )
    ||
      format('➡️ Push [{0}]',
        github.ref_name
      )
  }}

jobs:
  testAllModes:
    permissions:
      checks: write
    environment: game.ci
    name: Test in ${{ matrix.testMode }} - ${{ matrix.unityVersion }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projectPath: [test-project/Packages/com.abrds.jam-starter]
        unityVersion: ['6000.4.1f1'] # some version must be included for package testing
        testMode: [editmode, playmode] #[editmode, playmode, Standalone]

    steps:
      - uses: actions/checkout@v4
        name: Download package
        with:
          lfs: true

      - name: Create test-project Directory & Copy package
        run: |
          PROJECT=${{ matrix.projectPath }}
          mkdir -p $PROJECT
          rsync -a --exclude test-project ./ $PROJECT      

      - name: Create TempProject Directory & Copy samples
        run: |
          SAMPLES=TempProject/Assets/Samples
          mkdir -p $SAMPLES
          rsync -a Samples~/ $SAMPLES      

      - uses: game-ci/unity-test-runner@v4
        name: Run Tests
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          packageMode: true
          projectPath: ${{ matrix.projectPath }}
          unityVersion: ${{ matrix.unityVersion }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: ${{ matrix.testMode }}-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} Test Results
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;assemblyFilters:+Jam-starter.*,+FixedPaletteTool.Runtime'
          customParameters: -nographics -batchmode

      ###############################################################
      ###############################################################
      ###############################################################

      - uses: actions/cache@v3
        name: Cache
        if: ${{ matrix.testMode }} == 'editmode'
        with:
          path: TempProject/Library
          key: Library-TempProject-WebGL
          restore-keys: |
            Library-TempProject-
            Library-

      - uses: game-ci/unity-builder@v4
        name: Build Test
        if: ${{ matrix.testMode }} == 'editmode'
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: TempProject
          unityVersion: ${{ matrix.unityVersion }}
          targetPlatform: WebGL

      ###############################################################

      - uses: actions/upload-artifact@v4
        name: Upload Artifacts
        if: always()
        with: 
          name: Test results for ${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}

      - uses: actions/upload-artifact@v4
        name: Upload Coverage Artifacts
        if: ${{ matrix.testMode }} == 'editmode'
        with:
          name: Coverage results for ${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.coveragePath }}

      - name: Parse Coverage HTML
        run: |
          python3 << 'EOF'
          from bs4 import BeautifulSoup

          file_path = "CodeCoverage/Report/index.html"

          with open(file_path, "r", encoding="utf-8") as f:
              soup = BeautifulSoup(f, "html.parser")

          rows = soup.find_all("tr")

          print("## 📊 Code Coverage Breakdown")

          for row in rows:
              name_cell = row.find(["th", "td"])
              coverage_cell = row.find("td", {"class": "right", "title": True})

              if not name_cell or not coverage_cell:
                  continue

              name = name_cell.get_text(strip=True)
              percent = coverage_cell.get_text(strip=True)
              title = coverage_cell.get("title", "")

              print(f"- **{name}** → {percent} ({title.replace('LineCoverage: ', '')})")
          EOF