name: Test package
on: [push, pull_request]
run-name: >
  Testing Package From ${{ github.event_name == 'pull_request' &&
      format('🔀 PR #{0} [{1}] - {2}',
        github.event.pull_request.number,
        github.head_ref,
        github.event.pull_request.title
      )
    ||
      format('➡️ Push [{0}]',
        github.ref_name
      )
  }}

jobs:
  testAllModes:
    permissions:
      checks: write
    environment: game.ci
    name: Test in ${{ matrix.testMode }} - ${{ matrix.unityVersion }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        projectPath: [test-project/Packages/com.abrds.jam-starter]
        unityVersion: ['6000.4.1f1'] # some version must be included for package testing
        testMode: [editmode, playmode] #[editmode, playmode, Standalone]

    steps:
      - uses: actions/checkout@v4
        name: Download package
        with:
          lfs: true

      - name: Create test-project Directory & Copy package
        run: |
          PROJECT=${{ matrix.projectPath }}
          mkdir -p $PROJECT
          rsync -a --exclude test-project ./ $PROJECT      

      - name: Create TempProject Directory & Copy samples
        run: |
          SAMPLES=TempProject/Assets/Samples
          mkdir -p $SAMPLES
          rsync -a Samples~/ $SAMPLES      

      - uses: actions/cache/restore@v5
        name: Restore Library Cache
        id: project-library-restore
        with:
          path: TempProject/Library
          key: Library-TempProject
          restore-keys: |
            Library-TempProject-
            Library-

      - uses: game-ci/unity-test-runner@v4
        name: Run Tests
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          packageMode: true
          projectPath: ${{ matrix.projectPath }}
          unityVersion: ${{ matrix.unityVersion }}
          testMode: ${{ matrix.testMode }}
          artifactsPath: ${{ matrix.testMode }}-artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: ${{ matrix.testMode }} Test Results
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;assemblyFilters:+Jam-starter.*,+FixedPaletteTool.Runtime'
          customParameters: -nographics -batchmode

      - uses: actions/cache/save@v5
        name: Save Library Cache
        id: project-library-save
        with:
          path: TempProject/Library
          key: Library-TempProject

      - uses: game-ci/unity-builder@v4
        if: ${{ matrix.testMode == 'editmode'}}
        name: WebGL Build Test
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: TempProject
          allowDirtyBuild: true
          unityVersion: ${{ matrix.unityVersion }}
          targetPlatform: WebGL

      - uses: actions/upload-artifact@v4
        name: Upload Artifacts
        if: always()
        with: 
          name: Test results for ${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}

      - uses: actions/upload-artifact@v4
        name: Upload Coverage Artifacts
        with:
          name: Coverage results for ${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.coveragePath }}

      - name: Generate Coverage Summary Table
        run: |
          python3 << 'EOF'
          from bs4 import BeautifulSoup

          file_path = "CodeCoverage/Report/index.html"

          with open(file_path, "r", encoding="utf-8") as f:
              soup = BeautifulSoup(f, "html.parser")

          rows = soup.find_all("tr")

          def get_emoji(percent):
              if percent >= 80:
                  return "🟩"
              elif percent >= 50:
                  return "🟨"
              else:
                  return "🟥"

          output = []
          output.append("## 📊 Code Coverage Summary\n")
          output.append("| Module | Coverage | Lines |\n")
          output.append("|--------|----------|--------|\n")

          for row in rows:
              name_cell = row.find(["th", "td"])
              coverage_cell = row.find("td", {"class": "right", "title": True})

              if not name_cell or not coverage_cell:
                  continue

              name = name_cell.get_text(strip=True)
              percent_text = coverage_cell.get_text(strip=True)
              title = coverage_cell.get("title", "")

              try:
                  percent_value = float(percent_text.replace("%", ""))
              except:
                  continue

              lines = title.replace("LineCoverage: ", "")
              emoji = get_emoji(percent_value)

              output.append(f"| {emoji} {name} | {percent_text} | {lines} |\n")

          with open("$GITHUB_STEP_SUMMARY", "a") as summary:
              summary.writelines(output)

          EOF